version: "3.9"
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/igtoxic.db
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_TARGET=${IG_TARGET:-}
      - COOKIES_PATH=/data/ig_session.json
    volumes:
      - data:/data
    restart: unless-stopped
volumes:
  data:
